version: 2

models:
  - name: int_dim__locations
    description: >
      Dimension des établissements (locations) enrichie.
      La normalisation de archived (10 formats STRING dans la source) est faite
      en staging via CASE LOWER(archived) + IFNULL. Une location est facturable si is_archived = false.
    columns:
      - name: location_id
        data_type: int64
        description: 'Unique identifier of the location'
        tests:
          - unique
          - not_null

      - name: location_name
        data_type: string
        description: 'Name of the establishment'

      - name: account_id
        data_type: int64
        description: 'Unique identifier of the client company (account)'
        tests:
          - not_null

      - name: is_archived
        data_type: bool
        description: 'true if the location is archived (non-billable)'
        tests:
          - not_null

      - name: location_city
        data_type: string
        description: 'City of the location'

      - name: location_zipcode
        data_type: string
        description: 'Zip code of the location'

      - name: location_country
        data_type: string
        description: 'Country of the location'

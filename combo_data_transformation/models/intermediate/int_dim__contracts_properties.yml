version: 2

models:
  - name: int_dim__contracts
    description: >
      Dimension des contrats enrichie avec les informations du membership (personne physique).
      Normalise active (STRING) en is_active_membership (BOOL).
      Gère les deux formats de contract_start via la macro normalize_date.
      Ajoute le flag is_duplicate_active_contract pour les couples membership × location
      ayant plusieurs CDI ouverts simultanément.
    columns:
      - name: user_contract_id
        data_type: int64
        description: 'Identifiant unique du contrat'
        tests:
          - unique
          - not_null

      - name: membership_id
        data_type: int64
        description: 'Identifiant de la personne physique (membership)'

      - name: location_id
        data_type: int64
        description: 'Location de rattachement du contrat (lieu de facturation)'
        tests:
          - not_null

      - name: account_id
        data_type: int64
        description: 'Compte auquel appartient le contrat'
        tests:
          - not_null

      - name: contract_start_date
        data_type: date
        description: 'Date de début du contrat, normalisée en staging via la macro normalize_date'

      - name: contract_end_date
        data_type: date
        description: 'Date de fin du contrat (NULL = CDI en cours)'

      - name: contract_type
        data_type: string
        description: 'Type de contrat (CDI, CDD, seasonal, etc.)'

      - name: contract_time
        data_type: string
        description: 'Temps de travail hebdomadaire prévu'

      - name: user_id
        data_type: int64
        description: 'Identifiant utilisateur cross-comptes'

      - name: firstname
        data_type: string
        description: 'Prénom de l employé'

      - name: lastname
        data_type: string
        description: 'Nom de l employé'

      - name: is_active_membership
        data_type: bool
        description: 'true si le membership est actif. Normalise les 10 formats source via IFNULL.'

      - name: is_duplicate_active_contract
        data_type: bool
        description: >
          true si ce contrat est un CDI ouvert en doublon : même membership_id ET même
          location_id avec au moins un autre CDI sans date de fin.
          Utilisé pour alerter sans bloquer la facturation (COUNT DISTINCT membership_id absorbe le doublon).

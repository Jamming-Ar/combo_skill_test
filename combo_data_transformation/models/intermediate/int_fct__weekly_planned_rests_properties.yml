version: 2

models:
  - name: int_fct__weekly_planned_rests
    description: >
      Table de faits des repos hebdomadaires par contrat.
      Grain : 1 ligne par (semaine, contrat) ayant eu au moins 1 repos.
      La semaine commence le lundi à 00:00 UTC.
      INNER JOIN sur int_dim__contracts exclut les repos dont le contrat est absent de la source.
      La location de facturation est celle du contrat, pas la location physique du repos.
    columns:
      - name: week_start
        data_type: date
        description: 'Date du lundi de la semaine (UTC)'
        tests:
          - not_null

      - name: user_contract_id
        data_type: int64
        description: 'Unique identifier of the contract linking a membership (employee)'
        tests:
          - not_null

      - name: membership_id
        data_type: int64
        description: 'Unique identifier of the membership'

      - name: location_id
        data_type: int64
        description: 'Unique identifier of the location'
        tests:
          - not_null

      - name: account_id
        data_type: int64
        description: 'Unique identifier of the client company (account)'
        tests:
          - not_null

      - name: is_duplicate_active_contract
        data_type: bool
        description: >
          true si ce contrat est un CDI ouvert en doublon : même membership_id ET même
          location_id avec au moins un autre CDI sans date de fin.
          Utilisé pour alerter sans bloquer la facturation (COUNT DISTINCT membership_id absorbe le doublon)


      - name: planned_rest_count
        data_type: int64
        description: 'Number of rest planned'

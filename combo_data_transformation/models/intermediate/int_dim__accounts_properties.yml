version: 2

models:
  - name: int_dim__accounts
    description: "Dimension des comptes clients (accounts)"
    columns:
      - name: account_id
        data_type: int64
        description: "Unique identifier of the client company (account)"
        tests:
          - unique
          - not_null

      - name: account_name
        data_type: string
        description: "Name of the client company"

      - name: account_created_at
        data_type: timestamp
        description: "Timestamp when the account was created"

      - name: time_zone
        data_type: string
        description: "Timezone of the record"

      - name: account_country
        data_type: string
        description: "Country where the account is registered"

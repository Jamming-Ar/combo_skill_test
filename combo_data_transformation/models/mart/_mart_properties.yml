version: 2

models:
  - name: mart_billing_metrics
    description: >
      Q1 — Métriques de facturation hebdomadaires par compte.
      Grain : 1 ligne par (semaine × compte).

      Définitions appliquées :
        - Location facturable : is_archived = false (toutes les semaines, même si 0 employés planifiés)
        - Employé facturable  : a eu ≥ 1 shift ou repos dans la semaine, compté par membership_id
          (personne physique) et non par user_contract_id pour absorber les 69 doublons CDI.
        - Semaine : lundi 00:00 UTC → dimanche 23:59 UTC
    columns:
      - name: week_start
        data_type: date
        description: 'Date du lundi de la semaine (UTC)'
        tests:
          - not_null

      - name: account_id
        data_type: int64
        description: 'Identifiant du compte client'
        tests:
          - not_null

      - name: account_name
        data_type: string
        description: 'Nom du compte client'

      - name: billable_location_count
        data_type: int64
        description: >
          Nombre de locations facturables du compte cette semaine.
          = COUNT DISTINCT location_id WHERE is_archived = false.
          Constant d une semaine à l autre (sauf changement de statut archived).
        tests:
          - not_null

      - name: billable_employee_count
        data_type: int64
        description: >
          Nombre d employés facturables du compte cette semaine.
          = COUNT DISTINCT membership_id ayant ≥ 1 planification sur une location non archivée.
          0 si aucun employé planifié cette semaine.
        tests:
          - not_null

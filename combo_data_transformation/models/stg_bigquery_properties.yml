version: 2
models:
  - name: stg_bigquery__accounts
    description: 'Staging model for client companies (accounts) subscribing to Combo'
    columns:
      - name: account_id
        data_type: int64
        description: 'Unique identifier of the client company (account)'

      - name: account_name
        data_type: string
        description: 'Name of the client company'

      - name: account_created_at
        data_type: timestamp
        description: 'Timestamp when the account was created'

      - name: time_zone
        data_type: string
        description: 'Timezone of the account (e.g. Europe/Paris)'

      - name: account_country
        data_type: string
        description: 'Country where the account is registered'

  - name: stg_bigquery__locations
    description: 'Staging model for establishments (locations) belonging to accounts. A billable location is one that is not archived.'
    columns:
      - name: location_id
        data_type: int64
        description: 'Unique identifier of the location (establishment)'

      - name: location_name
        data_type: string
        description: 'Name of the establishment'

      - name: account_id
        data_type: int64
        description: 'Account this location belongs to'

      - name: archived
        data_type: string
        description: 'Whether the location is archived (non-active locations are not billable)'

      - name: location_city
        data_type: string
        description: 'City of the location'

      - name: location_zipcode
        data_type: string
        description: 'Zip code of the location'

      - name: location_country
        data_type: string
        description: 'Country of the location'

  - name: stg_bigquery__memberships
    description: 'Staging model for employees (memberships) within accounts'
    columns:
      - name: membership_id
        data_type: int64
        description: 'Unique identifier of the membership (employee within an account)'

      - name: user_id
        data_type: int64
        description: 'Unique identifier of the user across all accounts'

      - name: account_id
        data_type: int64
        description: 'Account this membership belongs to'

      - name: is_active_membership
        data_type: string
        description: 'Whether the membership is currently active'

      - name: membership_role
        data_type: string
        description: 'Role of the member within the account (employee, manager, owner)'

      - name: firstname
        data_type: string
        description: 'First name of the employee'

      - name: lastname
        data_type: string
        description: 'Last name of the employee'

  - name: stg_bigquery__user_contracts
    description: 'Staging model for employment contracts linking employees to their home location'
    columns:
      - name: user_contract_id
        data_type: int64
        description: 'Unique identifier of the contract linking an employee to a home location'

      - name: membership_id
        data_type: int64
        description: 'Reference to the employee membership'

      - name: location_id
        data_type: int64
        description: 'Home location of the employee for this contract'

      - name: account_id
        data_type: int64
        description: 'Account this contract belongs to'

      - name: contract_start
        data_type: string
        description: 'Contract start date'

      - name: contract_end
        data_type: date
        description: 'Contract end date (null for open-ended CDI contracts)'

      - name: contract_type
        data_type: string
        description: 'Type of contract (CDI, CDD, seasonal, etc.)'

      - name: contract_time
        data_type: string
        description: 'Weekly planned working hours defined in the contract'

  - name: stg_bigquery__shifts
    description: 'Staging model for planned work shifts assigned to employees. A billable employee is scheduled at least once per week (shift or rest) at their contract location.'
    columns:
      - name: shift_id
        data_type: int64
        description: 'Unique identifier of the shift'

      - name: user_contract_id
        data_type: int64
        description: 'Contract of the employee scheduled for this shift'

      - name: account_id
        data_type: int64
        description: 'Account this shift belongs to'

      - name: shift_starts_at
        data_type: timestamp
        description: 'Planned start datetime of the shift (UTC)'

      - name: shift_ends_at
        data_type: timestamp
        description: 'Planned end datetime of the shift (UTC)'

      - name: planification_type
        data_type: string
        description: 'Type of planning for the shift (e.g. work, training)'

  - name: stg_bigquery__rests
    description: 'Staging model for rest periods assigned to employees (absences, leave, compensatory rest, etc.)'
    columns:
      - name: rest_id
        data_type: int64
        description: 'Unique identifier of the rest period'

      - name: user_contract_id
        data_type: int64
        description: 'Contract of the employee on rest'

      - name: account_id
        data_type: int64
        description: 'Account this rest period belongs to'

      - name: rest_starts_at
        data_type: timestamp
        description: 'Start datetime of the rest period (UTC)'

      - name: rest_ends_at
        data_type: timestamp
        description: 'End datetime of the rest period (UTC)'

      - name: rest_type
        data_type: string
        description: 'Type of rest (weekly_rest, compensatory_rest, formation, etc.)'
